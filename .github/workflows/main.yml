name: Main

on:
  push:
    branches: [main]
    paths-ignore:
      - 'mobile-app/**'
      - 'ai-studio-base/**'
      - 'tsx-playground/**'
      - 'docs/**'
      - '**.md'

jobs:
  build:
    name: Lint · Type-check · Build (all apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install

      - name: Lint, type-check, build (all apps)
        run: bunx turbo run lint type-check build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TELEMETRY_DISABLED: 1

name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "mobile-app/**"
      - "ai-studio-base/**"
      - "tsx-playground/**"
      - "docs/**"
      - "**.md"

jobs:
  quality:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install 

      - name: Lint, type-check, build (changed apps only)
        run: bunx turbo run lint type-check build --filter=[HEAD^1]
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TELEMETRY_DISABLED: 1
